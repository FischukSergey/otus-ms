global:
  env: local

log:
  level: info
  format: text
  service_name: main-service

servers:
  debug:
    addr: "0.0.0.0:6060"
  client:
    addr: "0.0.0.0:8080"
    allow_origins:
      - "*"
  metrics:
    addr: "0.0.0.0:9090"

db:
  name: otus_ms_test
  user: otus_ms_test
  password: otus_ms_test
  host: postgres
  port: "5432"
