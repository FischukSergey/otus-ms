# Auth-Proxy Configuration (Production) - EXAMPLE
# Скопируйте этот файл на VPS как config.auth-proxy.prod.yaml и заполните реальными значениями
global:
  env: prod

log:
  level: info
  format: json
  service_name: auth-proxy

servers:
  client:
    addr: 0.0.0.0:38081  # Auth-Proxy API

keycloak:
  url: "https://yourdomain.com/auth"  # Production Keycloak URL
  realm: "your-realm"  # Имя realm в Keycloak
  client_id: "auth-proxy"
  client_secret: "your-client-secret-here"  # ОБЯЗАТЕЛЬНО замените на реальный secret из Keycloak

main_service:
  url: "http://otus-microservice-be:38080"  # Main Service API (через Docker network)

# Rate Limiter — ограничение попыток входа по IP.
# Требует запущенного Redis (например, через docker-compose.redis.yml или отдельный инстанс).
rate_limiter:
  redis_addr: "redis:6379"        # имя сервиса в Docker-сети
  redis_password: ""
  max_attempts: 10                # максимум попыток за окно
  window_seconds: 60              # длительность окна в секундах
