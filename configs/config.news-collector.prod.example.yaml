# News Collector Service — production конфигурация (шаблон)
# Скопируйте как config.news-collector.prod.yaml и заполните секреты
global:
  env: prod

log:
  level: info
  format: json
  service_name: news-collector

servers:
  client:
    addr: 0.0.0.0:38082  # HTTP health check

# Keycloak service account для получения JWT при gRPC вызовах
# client_id должен совпадать с именем клиента в Keycloak
# KEYCLOAK_CLIENT_SECRET — устанавливать через environment variable или вручную на VPS
keycloak:
  url: "https://fishouk-otus-ms.ru/auth"
  realm: "otus-ms"
  client_id: "news-collector"
  client_secret: "CHANGE_ME"  # Секрет клиента news-collector из Keycloak

# Main Service gRPC адрес — используем имя контейнера в Docker-сети otus_network
main_service:
  grpc_addr: "otus-microservice-be-prod:50051"

# Redis — имя контейнера в Docker-сети otus_network. DB=1 (DB=0 занят rate limiter).
redis:
  addr: "otus-redis-prod:6379"
  password: ""
  db: 1

# Настройки планировщика, парсера и дедупликации
collector:
  max_workers: 5
  max_retries: 3
  max_error_count: 5
  parse_timeout: 30s
  refresh_interval: 5m
  dedup_ttl: 168h  # 7 дней: URL новости считается дублём в течение недели
