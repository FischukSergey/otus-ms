# config.yaml
global:
  env: prod

log:
  level: info
 
servers:
  debug:
    addr: 0.0.0.0:33000
  client:
    addr: 0.0.0.0:38080
    allow_origins:
      - "https://yourdomain.com"

db:
  name: otus_ms_prod # database name
  user: otus_ms_user # database user
  password: CHANGE_ME_STRONG_PASSWORD # database password - ОБЯЗАТЕЛЬНО ИЗМЕНИТЕ!
  host: postgres # database host (имя сервиса в docker-compose или IP)
  port: 5432 # database port
  ssl_mode: require # database ssl mode для production
  ssl_root_cert: # path to SSL root certificate if needed
  ssl_key: # path to SSL key if needed
