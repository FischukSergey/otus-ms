# config.yaml
global:
  env: prod

log:
  level: info
  format: json
  service_name: main-service
 
servers:
  debug:
    addr: 0.0.0.0:33000
  client:
    addr: 0.0.0.0:38080
    allow_origins:
      - "https://yourdomain.com"
  metrics:
    addr: 0.0.0.0:39090

db:
  name: otus_ms_prod # database name
  user: otus_ms_user # database user
  password: CHANGE_ME_STRONG_PASSWORD # database password - ОБЯЗАТЕЛЬНО ИЗМЕНИТЕ!
  host: postgres # имя контейнера PostgreSQL (otus-postgres-prod подключен к той же сети)
  port: "5432" # database port (внутренний порт в Docker сети)
  ssl_mode: require # SSL обязателен (require = SSL без проверки сертификата, verify-ca = с проверкой CA)
  ssl_root_cert: # path to SSL root certificate if needed (для verify-ca или verify-full)
  ssl_key: # path to SSL key if needed (для client certificate authentication)
