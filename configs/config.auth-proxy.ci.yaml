# Auth-Proxy Configuration (CI/CD Environment)
# Этот конфиг используется в GitHub Actions
# Секреты берутся из переменных окружения
global:
  env: local

log:
  level: info
  format: text
  service_name: auth-proxy

servers:
  client:
    addr: 0.0.0.0:38081

keycloak:
  url: "https://fishouk-otus-ms.ru/auth"
  realm: "otus-ms"
  client_id: "auth-proxy"
  client_secret: ""  # Читается из переменной окружения KEYCLOAK_CLIENT_SECRET

main_service:
  url: "http://localhost:8080"  # Main Service запущен как процесс в CI/CD
