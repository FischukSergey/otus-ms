name: otusms-test

services:
  postgres:
    container_name: otusms-postgres-test
    image: postgres:16-alpine
    restart: no
    ports:
      - "38433:5432"
    environment:
      - POSTGRES_DB=otus_ms_test
      - POSTGRES_USER=otus_ms_test
      - POSTGRES_PASSWORD=otus_ms_test
    networks:
      - otusms_test_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U otus_ms_test -d otus_ms_test"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  api-server:
    container_name: otusms-api-test
    build:
      context: ../..
      dockerfile: prod.Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8081:8080"   # API server
      - "9091:9090"   # Metrics server
    command: ["./main-service", "-config", "/app/configs/config.test.yaml"]
    volumes:
      - ../../configs/config.test.yaml:/app/configs/config.test.yaml:ro
    networks:
      - otusms_test_network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  auth-proxy:
    container_name: otusms-auth-proxy-test
    build:
      context: ../..
      dockerfile: auth-proxy.Dockerfile
    ports:
      - "38081:8080"   # Auth-Proxy API
    command: ["./auth-proxy", "-config", "/app/configs/config.auth-proxy.test.yaml"]
    volumes:
      - ../../configs/config.auth-proxy.test.yaml:/app/configs/config.auth-proxy.test.yaml:ro
    networks:
      - otusms_test_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

networks:
  otusms_test_network:
    name: otusms_test_network
    driver: bridge

