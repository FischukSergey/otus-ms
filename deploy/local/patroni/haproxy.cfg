global
    maxconn 100
    log stdout format raw local0

defaults
    log global
    mode tcp
    retries 2
    timeout connect 5s
    timeout client  30s
    timeout server  30s

# Точка входа для PostgreSQL: всегда направляет на текущий primary.
# Определение primary — HTTP-check на Patroni REST API (GET /primary → 200 только у primary).
frontend postgres
    bind *:5000
    default_backend postgres_primary

backend postgres_primary
    option httpchk GET /primary
    http-check expect status 200
    default-server inter 2s fall 3 rise 2 on-marked-down shutdown-sessions
    server node1 patroni-node1:5432 check port 8008
    server node2 patroni-node2:5432 check port 8008

# HAProxy Stats — страница статуса: http://localhost:38480/
listen stats
    bind *:7000
    mode http
    stats enable
    stats uri /
    stats refresh 5s
    stats show-legends
    stats show-node
