name: otusms  # Уникальное имя проекта, чтобы избежать конфликтов

services:
  postgres:
    container_name: otusms-postgres-local
    image: postgres:16-alpine
    profiles:
      - db  # Запускается с профилем: docker compose --profile db up
    restart: unless-stopped
    ports:
      - "38432:5432"
    environment:
      - POSTGRES_DB=otus_ms
      - POSTGRES_USER=otus_ms
      - POSTGRES_PASSWORD=otus_ms
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - otusms_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U otus_ms -d otus_ms"]
      interval: 10s
      timeout: 5s
      retries: 5

  prometheus:
    container_name: otusms-prometheus-local
    image: prom/prometheus:latest
    profiles:
      - monitoring  # Запускается с профилем: docker compose --profile monitoring up
    restart: unless-stopped
    ports:
      - "39000:9090"  # Prometheus UI будет доступен на localhost:39000
    volumes:
      - ../../configs/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--storage.tsdb.retention.time=30d'  # Хранить данные 30 дней
      - '--web.enable-lifecycle'  # Разрешить перезагрузку конфигурации через API
    networks:
      - otusms_network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 3

networks:
  otusms_network:
    name: otusms_local_network
    driver: bridge

volumes:
  postgres_data:
    name: otusms_postgres_data_local
  prometheus_data:
    name: otusms_prometheus_data_local

