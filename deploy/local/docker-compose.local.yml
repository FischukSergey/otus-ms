name: otusms  # Уникальное имя проекта, чтобы избежать конфликтов

services:
  postgres:
    container_name: otusms-postgres-local
    image: postgres:16-alpine
    profiles:
      - db  # Запускается с профилем: docker compose --profile db up
    restart: unless-stopped
    ports:
      - "38432:5432"
    environment:
      - POSTGRES_DB=otus_ms
      - POSTGRES_USER=otus_ms
      - POSTGRES_PASSWORD=otus_ms
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - otusms_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U otus_ms -d otus_ms"]
      interval: 10s
      timeout: 5s
      retries: 5

  prometheus:
    container_name: otusms-prometheus-local
    image: prom/prometheus:latest
    profiles:
      - monitoring  # Запускается с профилем: docker compose --profile monitoring up
    restart: unless-stopped
    ports:
      - "39000:9090"  # Prometheus UI будет доступен на localhost:39000
    volumes:
      - ../../configs/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ../../configs/prometheus_alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--storage.tsdb.retention.time=30d'  # Хранить данные 30 дней
      - '--web.enable-lifecycle'  # Разрешить перезагрузку конфигурации через API
    networks:
      - otusms_network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 3

  alertmanager:
    container_name: otusms-alertmanager-local
    image: prom/alertmanager:latest
    profiles:
      - monitoring  # docker compose --profile alertmanager up
    restart: unless-stopped
    ports:
      - "39093:9093"  # Alertmanager UI
    volumes:
      - ../../configs/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    networks:
      - otusms_network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9093/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 3

  news-collector:
    container_name: otusms-news-collector-local
    build:
      context: ../..
      dockerfile: news-collector.Dockerfile
    profiles:
      - news-collector  # docker compose --profile news-collector up
    restart: unless-stopped
    ports:
      - "38082:38082"  # HTTP health check
    volumes:
      - ../../configs/config.news-collector.local.yaml:/app/configs/config.news-collector.local.yaml:ro
    command: ["./news-collector", "-config", "/app/configs/config.news-collector.local.yaml"]
    networks:
      - otusms_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:38082/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  auth-proxy:
    container_name: otusms-auth-proxy-local
    build:
      context: ../..
      dockerfile: auth-proxy.Dockerfile
    profiles:
      - auth  # Запускается с профилем: docker compose --profile auth up
    restart: unless-stopped
    ports:
      - "38081:38081"  # API port
    volumes:
      - ../../configs/config.auth-proxy.local.yaml:/app/configs/config.auth-proxy.local.yaml:ro
      - auth_proxy_logs:/app/logs
    command: ["./auth-proxy", "-config", "/app/configs/config.auth-proxy.local.yaml"]
    networks:
      - otusms_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:38081/health"]
      interval: 10s
      timeout: 5s
      retries: 3

networks:
  otusms_network:
    name: otusms_local_network
    driver: bridge

volumes:
  postgres_data:
    name: otusms_postgres_data_local
  prometheus_data:
    name: otusms_prometheus_data_local
  alertmanager_data:
    name: otusms_alertmanager_data_local
  auth_proxy_logs:
    name: otusms_auth_proxy_logs_local

