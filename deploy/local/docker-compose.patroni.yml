# Лайт-кластер Patroni: 1 etcd + 2 узла (primary + replica).
# Используется тот же volume, что и для обычного postgres в docker-compose.local.yml.
# Запуск: docker compose -f deploy/local/docker-compose.patroni.yml up -d
# Откат: см. deploy/local/patroni/README.md
name: otusms-patroni

services:
  etcd:
    image: quay.io/coreos/etcd:v3.5.16
    container_name: otusms-etcd-local
    environment:
      ETCD_NAME: etcd1
      ETCD_LISTEN_CLIENT_URLS: http://0.0.0.0:2379
      ETCD_ADVERTISE_CLIENT_URLS: http://etcd:2379
      ETCD_LISTEN_PEER_URLS: http://0.0.0.0:2380
      ETCD_INITIAL_ADVERTISE_PEER_URLS: http://etcd:2380
      ETCD_INITIAL_CLUSTER: etcd1=http://etcd:2380
      ETCD_INITIAL_CLUSTER_STATE: new
      ETCD_INITIAL_CLUSTER_TOKEN: otusms-patroni
    networks:
      - patroni_network
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  patroni-node1:
    build:
      context: ./patroni
      dockerfile: Dockerfile
    image: otusms-patroni:local
    container_name: otusms-patroni-node1-local
    hostname: patroni-node1
    depends_on:
      etcd:
        condition: service_healthy
    environment:
      PATRONI_CONFIG_PATH: /etc/patroni/patroni.yml
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./patroni/patroni-node1.yml:/etc/patroni/patroni.yml:ro
    networks:
      - patroni_network
    ports:
      - "38432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U otus_ms -d otus_ms -h 127.0.0.1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  patroni-node2:
    image: otusms-patroni:local
    container_name: otusms-patroni-node2-local
    hostname: patroni-node2
    depends_on:
      etcd:
        condition: service_healthy
      patroni-node1:
        condition: service_healthy
    environment:
      PATRONI_CONFIG_PATH: /etc/patroni/patroni.yml
    volumes:
      - patroni_replica_data:/var/lib/postgresql/data
      - ./patroni/patroni-node2.yml:/etc/patroni/patroni.yml:ro
    networks:
      - patroni_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U otus_ms -d otus_ms -h 127.0.0.1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s

networks:
  patroni_network:
    name: otusms_patroni_network
    driver: bridge

volumes:
  postgres_data:
    external: true
    name: otusms_postgres_data_local
  patroni_replica_data:
    name: otusms_patroni_replica_data_local
