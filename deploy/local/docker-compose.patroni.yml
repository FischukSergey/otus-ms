# Лайт-кластер Patroni: 1 etcd + 2 узла (primary + replica) + HAProxy.
# Используется тот же volume, что и для обычного postgres в docker-compose.local.yml.
#
# Топология портов на хосте:
#   38432 — HAProxy (единая точка входа для приложения, всегда primary)
#   38480 — HAProxy stats (http://localhost:38480/)
#   38008 — Patroni REST API node1 (patronictl, мониторинг)
#   38009 — Patroni REST API node2 (patronictl, мониторинг)
#
# Запуск: docker compose -f deploy/local/docker-compose.patroni.yml up -d
# Откат: см. deploy/local/patroni/README.md
name: otusms-patroni

services:
  etcd:
    image: quay.io/coreos/etcd:v3.5.16
    container_name: otusms-etcd-local
    environment:
      ETCD_NAME: etcd1
      ETCD_LISTEN_CLIENT_URLS: http://0.0.0.0:2379
      ETCD_ADVERTISE_CLIENT_URLS: http://etcd:2379
      ETCD_LISTEN_PEER_URLS: http://0.0.0.0:2380
      ETCD_INITIAL_ADVERTISE_PEER_URLS: http://etcd:2380
      ETCD_INITIAL_CLUSTER: etcd1=http://etcd:2380
      ETCD_INITIAL_CLUSTER_STATE: new
      ETCD_INITIAL_CLUSTER_TOKEN: otusms-patroni
    networks:
      - patroni_network
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  patroni-node1:
    build:
      context: ./patroni
      dockerfile: Dockerfile
    image: otusms-patroni:local
    container_name: otusms-patroni-node1-local
    hostname: patroni-node1
    depends_on:
      etcd:
        condition: service_healthy
    environment:
      PATRONI_CONFIG_PATH: /etc/patroni/patroni.yml
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./patroni/patroni-node1.yml:/etc/patroni/patroni.yml:ro
    networks:
      - patroni_network
    ports:
      - "38008:8008"  # Patroni REST API (patronictl, мониторинг)
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U otus_ms -d otus_ms -h 127.0.0.1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  patroni-node2:
    image: otusms-patroni:local
    container_name: otusms-patroni-node2-local
    hostname: patroni-node2
    depends_on:
      etcd:
        condition: service_healthy
      patroni-node1:
        condition: service_healthy
    environment:
      PATRONI_CONFIG_PATH: /etc/patroni/patroni.yml
    volumes:
      - patroni_replica_data:/var/lib/postgresql/data
      - ./patroni/patroni-node2.yml:/etc/patroni/patroni.yml:ro
    networks:
      - patroni_network
    ports:
      - "38009:8008"  # Patroni REST API (patronictl, мониторинг)
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U otus_ms -d otus_ms -h 127.0.0.1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s

  haproxy:
    image: haproxy:2.8-alpine
    container_name: otusms-patroni-haproxy-local
    depends_on:
      patroni-node1:
        condition: service_healthy
      patroni-node2:
        condition: service_healthy
    volumes:
      - ./patroni/haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    networks:
      - patroni_network
    ports:
      - "38432:5000"  # PostgreSQL primary (единая точка входа для приложения)
      - "38480:7000"  # HAProxy stats: http://localhost:38480/
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "haproxy", "-c", "-f", "/usr/local/etc/haproxy/haproxy.cfg"]
      interval: 10s
      timeout: 5s
      retries: 3

networks:
  patroni_network:
    name: otusms_patroni_network
    driver: bridge

volumes:
  postgres_data:
    external: true
    name: otusms_postgres_data_local
  patroni_replica_data:
    name: otusms_patroni_replica_data_local
