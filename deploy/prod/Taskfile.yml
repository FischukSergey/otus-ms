# https://taskfile.dev
# Production deployment tasks
version: '3'

silent: true

vars:
  # SSH alias из ~/.ssh/config (например: ssh otus-prod)
  SSH_HOST:
    sh: echo "${SSH_HOST:-otus-prod}"
  VPS_PATH_BE: /root/otus-microservice/prod/be
  VPS_PATH_DB: /root/otus-microservice/prod/db
  VPS_PATH_AUTH: /root/otus-microservice/prod/auth-proxy
  VPS_PATH_NC: /root/otus-microservice/prod/news-collector
  VPS_PATH_SWAGGER: /root/otus-microservice/prod/swagger
  VPS_PATH_MONITORING: /root/otus-microservice/prod/monitoring
  VPS_PATH_REDIS: /root/otus-microservice/prod/redis
  VPS_PATH_KAFKA: /root/otus-microservice/prod/kafka
  VPS_PATH_NP: /root/otus-microservice/prod/news-processor

tasks:
  # ===== Конфигурация =====

  config:upload:
    desc: "Загрузить конфиги на VPS (main-service + auth-proxy + news-collector)"
    cmds:
      - echo "📤 Загрузка конфигурационных файлов на VPS..."
      - scp configs/config.prod.yaml {{.SSH_HOST}}:{{.VPS_PATH_BE}}/configs/
      - echo "✅ config.prod.yaml → {{.VPS_PATH_BE}}/configs/"
      - scp configs/config.auth-proxy.prod.yaml {{.SSH_HOST}}:{{.VPS_PATH_AUTH}}/configs/
      - echo "✅ config.auth-proxy.prod.yaml → {{.VPS_PATH_AUTH}}/configs/"
      - ssh {{.SSH_HOST}} "mkdir -p {{.VPS_PATH_NC}}/configs"
      - scp configs/config.news-collector.prod.yaml {{.SSH_HOST}}:{{.VPS_PATH_NC}}/configs/
      - echo "✅ config.news-collector.prod.yaml → {{.VPS_PATH_NC}}/configs/"
      - ssh {{.SSH_HOST}} "mkdir -p {{.VPS_PATH_NP}}/configs"
      - scp configs/config.news-processor.prod.yaml {{.SSH_HOST}}:{{.VPS_PATH_NP}}/configs/
      - echo "✅ config.news-processor.prod.yaml → {{.VPS_PATH_NP}}/configs/"

  config:upload:monitoring:
    desc: "Загрузить конфиги мониторинга на VPS (prometheus, loki, promtail, alertmanager)"
    cmds:
      - echo "📤 Загрузка конфигов мониторинга на VPS..."
      - ssh {{.SSH_HOST}} "mkdir -p {{.VPS_PATH_MONITORING}}/configs"
      - scp configs/prometheus.yml {{.SSH_HOST}}:{{.VPS_PATH_MONITORING}}/configs/
      - echo "✅ prometheus.yml → {{.VPS_PATH_MONITORING}}/configs/"
      - scp configs/prometheus_alerts.yml {{.SSH_HOST}}:{{.VPS_PATH_MONITORING}}/configs/
      - echo "✅ prometheus_alerts.yml → {{.VPS_PATH_MONITORING}}/configs/"
      - scp configs/alertmanager.yml {{.SSH_HOST}}:{{.VPS_PATH_MONITORING}}/configs/
      - echo "✅ alertmanager.yml → {{.VPS_PATH_MONITORING}}/configs/"
      - scp configs/loki.yml {{.SSH_HOST}}:{{.VPS_PATH_MONITORING}}/configs/
      - echo "✅ loki.yml → {{.VPS_PATH_MONITORING}}/configs/"
      - scp configs/promtail.yml {{.SSH_HOST}}:{{.VPS_PATH_MONITORING}}/configs/
      - echo "✅ promtail.yml → {{.VPS_PATH_MONITORING}}/configs/"

  config:upload:all:
    desc: "Загрузить ВСЕ конфигурационные файлы на VPS (сервисы + мониторинг)"
    cmds:
      - echo "🚀 Полная загрузка конфигурационных файлов на VPS..."
      - task: config:upload
      - task: config:upload:monitoring
      - echo "🎉 Все конфигурационные файлы успешно загружены на VPS"

  config:download:
    desc: "Скачать config.prod.yaml с VPS (backup)"
    cmds:
      - echo "📥 Скачивание config.prod.yaml с VPS..."
      - scp {{.SSH_HOST}}:{{.VPS_PATH_BE}}/configs/config.prod.yaml configs/config.prod.yaml.backup
      - echo "✅ Конфиг скачан в configs/config.prod.yaml.backup"

  config:edit:
    desc: "Открыть config.prod.yaml на VPS в nano"
    cmds:
      - ssh {{.SSH_HOST}} "nano {{.VPS_PATH_BE}}/configs/config.prod.yaml"

  config:edit:auth:
    desc: "Открыть config.auth-proxy.prod.yaml на VPS в nano"
    cmds:
      - ssh {{.SSH_HOST}} "nano {{.VPS_PATH_AUTH}}/configs/config.auth-proxy.prod.yaml"

  # ===== Мониторинг =====

  logs:
    desc: "Показать логи API сервера"
    cmds:
      - ssh {{.SSH_HOST}} "docker logs otus-microservice-be-prod --tail=100 -f"

  logs:db:
    desc: "Показать логи PostgreSQL"
    cmds:
      - ssh {{.SSH_HOST}} "docker logs otus-postgres-prod --tail=100 -f"

  logs:auth:
    desc: "Показать логи Auth-Proxy сервера"
    cmds:
      - ssh {{.SSH_HOST}} "docker logs otus-microservice-auth-proxy-prod --tail=100 -f"

  status:
    desc: "Статус контейнеров"
    cmds:
      - echo "🔍 Статус контейнеров на production:"
      - ssh {{.SSH_HOST}} "docker ps -a | grep -E 'otus-|CONTAINER'"

  health:
    desc: "Проверить healthcheck API"
    cmds:
      - echo "🏥 Healthcheck API сервера:"
      - ssh {{.SSH_HOST}} "curl -s http://localhost:38080/health | jq ."

  health:auth:
    desc: "Проверить healthcheck Auth-Proxy"
    cmds:
      - echo "🏥 Healthcheck Auth-Proxy сервера:"
      - ssh {{.SSH_HOST}} "curl -s http://localhost:38081/health | jq ."

  # ===== Управление API сервером =====

  restart:
    desc: "Перезапустить API сервер"
    cmds:
      - echo "🔄 Перезапуск API сервера..."
      - ssh {{.SSH_HOST}} "cd {{.VPS_PATH_BE}} && docker compose -f docker-compose.be.prod.yml restart"
      - echo "✅ API сервер перезапущен"

  stop:
    desc: "Остановить API сервер"
    cmds:
      - echo "⏸️  Остановка API сервера..."
      - ssh {{.SSH_HOST}} "cd {{.VPS_PATH_BE}} && docker compose -f docker-compose.be.prod.yml stop"
      - echo "✅ API сервер остановлен"

  start:
    desc: "Запустить API сервер"
    cmds:
      - echo "▶️  Запуск API сервера..."
      - ssh {{.SSH_HOST}} "cd {{.VPS_PATH_BE}} && docker compose -f docker-compose.be.prod.yml start"
      - echo "✅ API сервер запущен"

  # ===== Управление Auth-Proxy сервером =====

  auth:up:
    desc: "Запустить Auth-Proxy сервер"
    cmds:
      - echo "🚀 Запуск Auth-Proxy..."
      - ssh {{.SSH_HOST}} "cd {{.VPS_PATH_AUTH}} && docker compose -f docker-compose.auth-proxy.prod.yml up -d"
      - sleep 5
      - task: health:auth
      - echo "✅ Auth-Proxy запущен"

  auth:down:
    desc: "Остановить Auth-Proxy сервер"
    cmds:
      - echo "⏸️  Остановка Auth-Proxy..."
      - ssh {{.SSH_HOST}} "cd {{.VPS_PATH_AUTH}} && docker compose -f docker-compose.auth-proxy.prod.yml down"
      - echo "✅ Auth-Proxy остановлен"

  auth:restart:
    desc: "Перезапустить Auth-Proxy сервер"
    cmds:
      - echo "🔄 Перезапуск Auth-Proxy..."
      - ssh {{.SSH_HOST}} "cd {{.VPS_PATH_AUTH}} && docker compose -f docker-compose.auth-proxy.prod.yml restart"
      - sleep 3
      - task: health:auth
      - echo "✅ Auth-Proxy перезапущен"

  # ===== Управление News Collector =====

  nc:up:
    desc: "Запустить News Collector (после main-service)"
    cmds:
      - echo "⏳ Проверяем доступность main-service..."
      - |
        ssh {{.SSH_HOST}} '
          for i in $(seq 1 12); do
            if curl -sf http://localhost:38080/health > /dev/null; then
              echo "✅ main-service доступен"; exit 0
            fi
            echo "  попытка $i/12, ждём 5 сек..."; sleep 5
          done
          echo "❌ main-service недоступен после 60 сек"; exit 1
        '
      - echo "🚀 Запуск News Collector..."
      - ssh {{.SSH_HOST}} "mkdir -p {{.VPS_PATH_NC}}/{configs,logs}"
      - scp deploy/prod/docker-compose.news-collector.prod.yml {{.SSH_HOST}}:{{.VPS_PATH_NC}}/
      - ssh {{.SSH_HOST}} "cd {{.VPS_PATH_NC}} && docker compose -f docker-compose.news-collector.prod.yml up -d"
      - sleep 5
      - task: nc:health
      - echo "✅ News Collector запущен"

  nc:down:
    desc: "Остановить News Collector"
    cmds:
      - echo "⏸️  Остановка News Collector..."
      - ssh {{.SSH_HOST}} "cd {{.VPS_PATH_NC}} && docker compose -f docker-compose.news-collector.prod.yml down"
      - echo "✅ News Collector остановлен"

  nc:restart:
    desc: "Перезапустить News Collector"
    cmds:
      - echo "🔄 Перезапуск News Collector..."
      - ssh {{.SSH_HOST}} "cd {{.VPS_PATH_NC}} && docker compose -f docker-compose.news-collector.prod.yml restart"
      - sleep 5
      - task: nc:health
      - echo "✅ News Collector перезапущен"

  nc:logs:
    desc: "Показать логи News Collector"
    cmds:
      - ssh {{.SSH_HOST}} "docker logs otus-news-collector-prod --tail=100 -f"

  nc:health:
    desc: "Проверить healthcheck News Collector"
    cmds:
      - echo "🏥 Healthcheck News Collector:"
      - ssh {{.SSH_HOST}} "curl -s http://localhost:38082/health | jq ."

  nc:config:edit:
    desc: "Открыть config.news-collector.prod.yaml на VPS в nano"
    cmds:
      - ssh {{.SSH_HOST}} "nano {{.VPS_PATH_NC}}/configs/config.news-collector.prod.yaml"

  # ===== Управление News Processor =====

  np:up:
    desc: "Запустить News Processor (после main-service и kafka)"
    cmds:
      - echo "⏳ Проверяем доступность main-service..."
      - |
        ssh {{.SSH_HOST}} '
          for i in $(seq 1 12); do
            if curl -sf http://localhost:38080/health > /dev/null; then
              echo "✅ main-service доступен"; exit 0
            fi
            echo "  попытка $i/12, ждём 5 сек..."; sleep 5
          done
          echo "❌ main-service недоступен после 60 сек"; exit 1
        '
      - echo "🚀 Запуск News Processor..."
      - ssh {{.SSH_HOST}} "mkdir -p {{.VPS_PATH_NP}}/{configs,logs}"
      - scp deploy/prod/docker-compose.news-processor.prod.yml {{.SSH_HOST}}:{{.VPS_PATH_NP}}/
      - ssh {{.SSH_HOST}} "cd {{.VPS_PATH_NP}} && docker compose -f docker-compose.news-processor.prod.yml up -d"
      - sleep 5
      - task: np:health
      - echo "✅ News Processor запущен"

  np:down:
    desc: "Остановить News Processor"
    cmds:
      - echo "⏸️  Остановка News Processor..."
      - ssh {{.SSH_HOST}} "cd {{.VPS_PATH_NP}} && docker compose -f docker-compose.news-processor.prod.yml down"
      - echo "✅ News Processor остановлен"

  np:restart:
    desc: "Перезапустить News Processor"
    cmds:
      - echo "🔄 Перезапуск News Processor..."
      - ssh {{.SSH_HOST}} "cd {{.VPS_PATH_NP}} && docker compose -f docker-compose.news-processor.prod.yml restart"
      - sleep 5
      - task: np:health
      - echo "✅ News Processor перезапущен"

  np:logs:
    desc: "Показать логи News Processor"
    cmds:
      - ssh {{.SSH_HOST}} "docker logs otus-news-processor-prod --tail=100 -f"

  np:health:
    desc: "Проверить healthcheck News Processor"
    cmds:
      - echo "🏥 Healthcheck News Processor:"
      - ssh {{.SSH_HOST}} "curl -s http://localhost:38083/health | jq ."

  np:config:edit:
    desc: "Открыть config.news-processor.prod.yaml на VPS в nano"
    cmds:
      - ssh {{.SSH_HOST}} "nano {{.VPS_PATH_NP}}/configs/config.news-processor.prod.yaml"

  # ===== Управление Redis =====

  redis:up:
    desc: "Запустить Redis (Rate Limiter) на VPS"
    cmds:
      - echo "Запуск Redis..."
      - ssh {{.SSH_HOST}} "mkdir -p {{.VPS_PATH_REDIS}}"
      - scp deploy/prod/docker-compose.redis.prod.yml {{.SSH_HOST}}:{{.VPS_PATH_REDIS}}/
      - ssh {{.SSH_HOST}} "cd {{.VPS_PATH_REDIS}} && docker compose -f docker-compose.redis.prod.yml up -d"
      - sleep 3
      - ssh {{.SSH_HOST}} "docker ps | grep otus-redis-prod"
      - echo "Redis запущен"

  redis:down:
    desc: "Остановить Redis (данные сохраняются)"
    cmds:
      - echo "Остановка Redis..."
      - ssh {{.SSH_HOST}} "cd {{.VPS_PATH_REDIS}} && docker compose -f docker-compose.redis.prod.yml down"
      - echo "Redis остановлен"

  redis:restart:
    desc: "Перезапустить Redis"
    cmds:
      - ssh {{.SSH_HOST}} "cd {{.VPS_PATH_REDIS}} && docker compose -f docker-compose.redis.prod.yml restart"
      - echo "Redis перезапущен"

  redis:logs:
    desc: "Показать логи Redis"
    cmds:
      - ssh {{.SSH_HOST}} "docker logs otus-redis-prod --tail=100 -f"

  redis:ping:
    desc: "Проверить доступность Redis"
    cmds:
      - ssh {{.SSH_HOST}} "docker exec otus-redis-prod valkey-cli ping"

  # ===== Управление БД =====

  db:up:
    desc: "Запустить PostgreSQL"
    cmds:
      - echo "🚀 Запуск PostgreSQL..."
      - ssh {{.SSH_HOST}} "cd {{.VPS_PATH_DB}} && docker compose -f docker-compose.db.prod.yml up -d"
      - sleep 5
      - task: status
      - echo "✅ PostgreSQL запущен"

  db:down:
    desc: "Остановить PostgreSQL (данные сохраняются)"
    cmds:
      - echo "⏸️  Остановка PostgreSQL..."
      - ssh {{.SSH_HOST}} "cd {{.VPS_PATH_DB}} && docker compose -f docker-compose.db.prod.yml down"
      - echo "✅ PostgreSQL остановлен"

  db:restart:
    desc: "Перезапустить PostgreSQL"
    cmds:
      - echo "🔄 Перезапуск PostgreSQL..."
      - ssh {{.SSH_HOST}} "cd {{.VPS_PATH_DB}} && docker compose -f docker-compose.db.prod.yml restart"
      - echo "✅ PostgreSQL перезапущен"

  db:connect:
    desc: "Подключиться к PostgreSQL через psql"
    cmds:
      - ssh {{.SSH_HOST}} -t "docker exec -it otus-postgres-prod psql -U otus_ms_user -d otus_ms_prod"

  db:migrations:
    desc: "Проверить примененные миграции"
    cmds:
      - echo "📋 Примененные миграции:"
      - ssh {{.SSH_HOST}} "docker exec otus-postgres-prod psql -U otus_ms_user -d otus_ms_prod -c 'SELECT * FROM schema_migrations ORDER BY version;'"

  # ===== Backup =====

  backup:db:
    desc: "Создать backup БД"
    cmds:
      - echo "💾 Создание backup БД..."
      - ssh {{.SSH_HOST}} "docker exec otus-postgres-prod pg_dump -U otus_ms_user otus_ms_prod > /tmp/backup_$(date +%Y%m%d_%H%M%S).sql"
      - echo "✅ Backup создан в /tmp/ на VPS"

  backup:db:download:
    desc: "Скачать последний backup БД"
    cmds:
      - echo "📥 Скачивание последнего backup..."
      - ssh {{.SSH_HOST}} "ls -t /tmp/backup_*.sql | head -1" > /tmp/latest_backup.txt
      - scp {{.SSH_HOST}}:$(cat /tmp/latest_backup.txt) ./backup_$(date +%Y%m%d).sql
      - rm /tmp/latest_backup.txt
      - echo "✅ Backup скачан в ./backup_$(date +%Y%m%d).sql"

  # ===== Деплой файлов =====

  deploy:compose:
    desc: "Загрузить docker-compose файлы на VPS"
    cmds:
      - echo "📤 Загрузка docker-compose файлов..."
      - scp deploy/prod/docker-compose.be.prod.yml {{.SSH_HOST}}:{{.VPS_PATH_BE}}/
      - scp deploy/prod/docker-compose.db.prod.yml {{.SSH_HOST}}:{{.VPS_PATH_DB}}/
      - scp deploy/prod/docker-compose.auth-proxy.prod.yml {{.SSH_HOST}}:{{.VPS_PATH_AUTH}}/
      - ssh {{.SSH_HOST}} "mkdir -p {{.VPS_PATH_NC}}"
      - scp deploy/prod/docker-compose.news-collector.prod.yml {{.SSH_HOST}}:{{.VPS_PATH_NC}}/
      - ssh {{.SSH_HOST}} "mkdir -p {{.VPS_PATH_REDIS}}"
      - scp deploy/prod/docker-compose.redis.prod.yml {{.SSH_HOST}}:{{.VPS_PATH_REDIS}}/
      - ssh {{.SSH_HOST}} "mkdir -p {{.VPS_PATH_KAFKA}}"
      - scp deploy/prod/docker-compose.kafka.prod.yml {{.SSH_HOST}}:{{.VPS_PATH_KAFKA}}/
      - ssh {{.SSH_HOST}} "mkdir -p {{.VPS_PATH_NP}}"
      - scp deploy/prod/docker-compose.news-processor.prod.yml {{.SSH_HOST}}:{{.VPS_PATH_NP}}/
      - echo "✅ Docker-compose файлы загружены"

  # ===== Swagger UI =====

  swagger:up:
    desc: "Запустить Swagger UI на VPS"
    cmds:
      - echo "🚀 Запуск Swagger UI..."
      - scp deploy/prod/docker-compose.swagger.prod.yml {{.SSH_HOST}}:{{.VPS_PATH_SWAGGER}}/
      - ssh {{.SSH_HOST}} "cd {{.VPS_PATH_SWAGGER}} && docker compose -f docker-compose.swagger.prod.yml pull && docker compose -f docker-compose.swagger.prod.yml up -d"
      - echo "Swagger UI запущен - https://fishouk-otus-ms.ru/swagger/"

  swagger:down:
    desc: "Остановить Swagger UI на VPS"
    cmds:
      - echo "⏹️  Остановка Swagger UI..."
      - ssh {{.SSH_HOST}} "cd {{.VPS_PATH_SWAGGER}} && docker compose -f docker-compose.swagger.prod.yml down"
      - echo "✅ Swagger UI остановлен"

  swagger:logs:
    desc: "Показать логи Swagger UI"
    cmds:
      - ssh {{.SSH_HOST}} "docker logs swagger-ui-prod --tail=100 -f"

  # ===== Управление Kafka =====

  kafka:up:
    desc: "Запустить Kafka на VPS (KRaft, без Zookeeper)"
    cmds:
      - echo "Запуск Kafka..."
      - ssh {{.SSH_HOST}} "mkdir -p {{.VPS_PATH_KAFKA}}"
      - scp deploy/prod/docker-compose.kafka.prod.yml {{.SSH_HOST}}:{{.VPS_PATH_KAFKA}}/
      - ssh {{.SSH_HOST}} "cd {{.VPS_PATH_KAFKA}} && docker compose -f docker-compose.kafka.prod.yml up -d"
      - sleep 10
      - task: kafka:status
      - 'echo "Kafka запущена. Kafka UI доступен через SSH-туннель: ssh -L 39080:localhost:39080 {{.SSH_HOST}}"'

  kafka:down:
    desc: "Остановить Kafka (данные сохраняются)"
    cmds:
      - echo "Остановка Kafka..."
      - ssh {{.SSH_HOST}} "cd {{.VPS_PATH_KAFKA}} && docker compose -f docker-compose.kafka.prod.yml down"
      - echo "Kafka остановлена"

  kafka:restart:
    desc: "Перезапустить Kafka"
    cmds:
      - echo "Перезапуск Kafka..."
      - ssh {{.SSH_HOST}} "cd {{.VPS_PATH_KAFKA}} && docker compose -f docker-compose.kafka.prod.yml restart kafka kafka-ui"
      - sleep 5
      - task: kafka:status
      - echo "Kafka перезапущена"

  kafka:logs:
    desc: "Показать логи Kafka"
    cmds:
      - ssh {{.SSH_HOST}} "docker logs otus-kafka-prod --tail=100 -f"

  kafka:status:
    desc: "Статус Kafka"
    cmds:
      - ssh {{.SSH_HOST}} "docker ps | grep -E 'otus-kafka|CONTAINER'"

  kafka:topics:
    desc: "Список топиков Kafka"
    cmds:
      - ssh {{.SSH_HOST}} "docker exec otus-kafka-prod kafka-topics --bootstrap-server localhost:9092 --list"

  kafka:topics:describe:
    desc: "Описание всех топиков Kafka"
    cmds:
      - ssh {{.SSH_HOST}} "docker exec otus-kafka-prod kafka-topics --bootstrap-server localhost:9092 --describe"

  # ===== Утилиты =====

  ssh:
    desc: "Подключиться к VPS по SSH"
    cmds:
      - ssh {{.SSH_HOST}}

  clean:
    desc: "Очистка неиспользуемых Docker ресурсов на VPS"
    cmds:
      - echo "🧹 Очистка Docker на VPS..."
      - ssh {{.SSH_HOST}} "docker system prune -f"
      - echo "✅ Очистка завершена"

  info:
    desc: "Показать информацию о VPS подключении"
    cmds:
      - echo "📡 VPS Connection Info:"
      - echo "   SSH Host{{.SSH_HOST}}"
      - echo "   BE Path{{.VPS_PATH_BE}}"
      - echo "   DB Path{{.VPS_PATH_DB}}"
      - echo "   Auth Path{{.VPS_PATH_AUTH}}"
      - echo ""
      - echo "💡 Настройка SSH alias в ~/.ssh/config:"
      - 'echo "   Host {{.SSH_HOST}}"'
      - 'echo "       HostName your-vps-ip"'
      - 'echo "       User root"'
      - 'echo "       IdentityFile ~/.ssh/id_ed25519"'
      - echo ""
      - echo "💡 Или установите переменную окружения:"
      - 'echo "   export SSH_HOST=your-ssh-alias"'

