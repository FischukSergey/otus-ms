services:
  otus-microservice-auth-proxy:
    container_name: otus-microservice-auth-proxy-prod
    image: cr.selcloud.ru/otus-microservice-be/auth-proxy:latest
    restart: always
    ports:
      - "0.0.0.0:38081:38081"  # API port
    volumes:
      - ./configs:/app/configs:ro
      - ./logs:/app/logs
    command: ["./auth-proxy", "-config", "/app/configs/config.auth-proxy.prod.yaml"]
    networks:
      - otus_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:38081/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    # Keycloak запускается отдельно через deploy-keycloak.yml workflow
    # и подключается через общую сеть otus_network
    # Конфиг с секретами хранится локально на VPS в ./configs/

networks:
  otus_network:
    name: otus_network
    driver: bridge
