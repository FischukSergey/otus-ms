# PostgreSQL для Production
# Запускается ОДИН РАЗ вручную и живет постоянно
# Не перезапускается при деплое API сервера

services:
  postgres:
    container_name: otus-postgres-prod
    image: postgres:16-alpine
    restart: always
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=otus_ms_prod
      - POSTGRES_USER=otus_ms_user
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-CHANGE_ME}  # Задается через secrets
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    networks:
      - otus_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U otus_ms_user -d otus_ms_prod"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

networks:
  otus_network:
    name: otus_network
    driver: bridge

volumes:
  postgres_data_prod:
    name: otus_postgres_data_prod

