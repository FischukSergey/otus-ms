# Keycloak для Production
# Развертывается через GitHub Actions
# Первый запуск - realm'ы создаются вручную через Admin UI

services:
  keycloak:
    container_name: otus-keycloak-prod
    image: quay.io/keycloak/keycloak:26.5.2
    restart: always
    ports:
      # Доступ только через nginx - биндим на localhost
      - "127.0.0.1:8080:8080"   # HTTP только для nginx
      # 8443 не нужен - SSL терминируется на nginx
    environment:
      # Database Configuration
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://otus-keycloak-postgres-prod:5432/keycloak_db
      KC_DB_USERNAME: keycloak_user
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD:-CHANGE_ME}
      
      # Admin User (используется ТОЛЬКО при первом запуске для создания admin)
      # При последующих запусках игнорируется - пароль берется из БД
      # Для смены пароля используйте Admin Console
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN_USER:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-CHANGE_ME}
      
      # Production Configuration
      # Frontend hostname (для клиентов) - генерирует HTTPS URL
      KC_HOSTNAME: ${KEYCLOAK_HOSTNAME:-localhost}
      KC_HTTP_RELATIVE_PATH: /auth
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_BACKCHANNEL: "false"  # Разрешает HTTP для внутренних запросов
      
      # HTTP & Proxy
      KC_HTTP_ENABLED: "true"
      KC_PROXY_HEADERS: xforwarded  # v2 параметр для чтения X-Forwarded-* заголовков
      
      # Явно указываем что frontend должен использовать HTTPS
      KC_HOSTNAME_PORT: "443"
      KC_HOSTNAME_SCHEME: https
      
      # Features
      KC_HEALTH_ENABLED: "true"
      KC_METRICS_ENABLED: "true"
      
      # Logging
      KC_LOG_LEVEL: info
    command:
      - start
      # Первый запуск - БЕЗ импорта, realm'ы создаются через Admin UI
    networks:
      - otus_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health/ready"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    depends_on:
      keycloak-postgres:
        condition: service_healthy

networks:
  otus_network:
    external: true
    name: otus_network
