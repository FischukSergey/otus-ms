services:
  otus-streamlit-client:
    container_name: otus-streamlit-client-prod
    image: cr.selcloud.ru/otus-microservice-be/streamlit-client:latest
    restart: always
    ports:
      - "0.0.0.0:38085:8501"  # Streamlit UI (внешний 38085 → внутренний 8501)
    environment:
      # Внутренние адреса по Docker-сети otus_network (без выхода на VPS host)
      - AUTH_PROXY_URL=http://otus-microservice-auth-proxy-prod:38081
      - MAIN_SERVICE_URL=http://otus-microservice-be-prod:38080
      - NEWS_COLLECTOR_URL=http://otus-news-collector-prod:38082
      - NEWS_PROCESSOR_URL=http://otus-news-processor-prod:38083
      - ALERT_WORKER_URL=http://otus-alert-worker-prod:38084
      - LOKI_URL=http://otus-loki-prod:3100
      - STREAMLIT_SERVER_BASE_URL_PATH=/admin 
    networks:
      - otus_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

networks:
  otus_network:
    name: otus_network
    driver: bridge
    # Используем существующую сеть, созданную другими сервисами
    external: true
