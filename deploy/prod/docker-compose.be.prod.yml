services:
  otus-microservice-be:
    container_name: otus-microservice-be-prod
    image: cr.selcloud.ru/otus-microservice-be:latest
    restart: always
    ports:
      - "0.0.0.0:38080:38080"  # API port
      - "0.0.0.0:33000:33000"  # Debug port
    volumes:
      - ./configs:/app/configs:ro
      - ./logs:/app/logs
      - ./data/files:/app/data/files
    environment:
      - CONFIG_PATH=/app/configs/config.prod.yaml
    command: ["./main-service", "-config", "/app/configs/config.prod.yaml"]
    networks:
      - otus_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:38080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

networks:
  otus_network:
    name: otus_network
    driver: bridge

