services:
  news-collector:
    container_name: otus-news-collector-prod
    image: cr.selcloud.ru/otus-microservice-be/news-collector:latest
    restart: always
    ports:
      - "127.0.0.1:38082:38082"  # HTTP health check — только localhost
    volumes:
      - ./configs:/app/configs:ro
      - ./logs:/app/logs
    command: ["./news-collector", "-config", "/app/configs/config.news-collector.prod.yaml"]
    networks:
      - otus_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:38082/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    # Запускать после main-service: task -d . -t deploy/prod/Taskfile.yml nc:up

networks:
  otus_network:
    external: true  # Сеть создаётся docker-compose.be.prod.yml
