services:
  news-processor:
    container_name: otus-news-processor-prod
    image: cr.selcloud.ru/otus-microservice-be/news-processor:latest
    restart: always
    ports:
      - "127.0.0.1:38083:38083"  # HTTP health check — только localhost
    volumes:
      - ./configs:/app/configs:ro
      - ./logs:/app/logs
    command: ["./news-processor", "-config", "/app/configs/config.news-processor.prod.yaml"]
    networks:
      - otus_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:38083/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    # Запускать после main-service и kafka: task -d . -t deploy/prod/Taskfile.yml np:up

networks:
  otus_network:
    external: true  # Сеть создаётся docker-compose.be.prod.yml
