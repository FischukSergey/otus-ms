syntax = "proto3";

package news.v1;

option go_package = "github.com/FischukSergey/otus-ms/pkg/news/v1;newsv1";

// NewsService предоставляет методы для работы с обработанными новостями.
// Используется news-processor для сохранения новостей через main-service.
service NewsService {
  // SaveProcessedNews сохраняет пачку обработанных новостей в PostgreSQL.
  // Дедупликация по URL на уровне БД: повторные URL игнорируются без ошибки.
  //
  // @Router /news.v1.NewsService/SaveProcessedNews [post].
  rpc SaveProcessedNews(SaveProcessedNewsRequest) returns (SaveProcessedNewsResponse);

  // GetActiveAlertRules возвращает активные правила алертинга.
  // Используется news-processor для матчинга ключевых слов.
  //
  // @Router /news.v1.NewsService/GetActiveAlertRules [post].
  rpc GetActiveAlertRules(GetActiveAlertRulesRequest) returns (GetActiveAlertRulesResponse);

  // ReserveAlertDelivery резервирует доставку алерта: дедуп + cooldown + pending.
  // Если should_send=false, доставку выполнять не нужно.
  //
  // @Router /news.v1.NewsService/ReserveAlertDelivery [post].
  rpc ReserveAlertDelivery(ReserveAlertDeliveryRequest) returns (ReserveAlertDeliveryResponse);

  // FinalizeAlertDelivery фиксирует финальный статус доставки алерта.
  //
  // @Router /news.v1.NewsService/FinalizeAlertDelivery [post].
  rpc FinalizeAlertDelivery(FinalizeAlertDeliveryRequest) returns (FinalizeAlertDeliveryResponse);
}

// ProcessedNewsItem — обработанная новость для сохранения.
message ProcessedNewsItem {
  string id          = 1; // UUID
  string source_id   = 2;
  string title       = 3;
  string summary     = 4;
  string url         = 5;
  string category    = 6;
  repeated string tags = 7;
  int64  published_at  = 8; // Unix timestamp (секунды)
  int64  processed_at  = 9; // Unix timestamp (секунды)
  string s3_key       = 10; // Ключ объекта с артефактом в S3-совместимом хранилище
}

// SaveProcessedNewsRequest содержит пачку новостей для сохранения.
message SaveProcessedNewsRequest {
  repeated ProcessedNewsItem news = 1;
}

// SaveProcessedNewsResponse возвращает количество реально сохранённых новостей.
message SaveProcessedNewsResponse {
  int32 saved_count = 1;
}

// AlertRule — минимальная проекция правила для матчинга в news-processor.
message AlertRule {
  string id = 1;
  string user_uuid = 2;
  string keyword = 3;
  int32 cooldown_seconds = 4;
}

// GetActiveAlertRulesRequest — запрос активных правил.
message GetActiveAlertRulesRequest {}

// GetActiveAlertRulesResponse — ответ со списком активных правил.
message GetActiveAlertRulesResponse {
  repeated AlertRule rules = 1;
}

// ReserveAlertDeliveryRequest — запрос на резервирование доставки.
message ReserveAlertDeliveryRequest {
  string event_id = 1;
  string rule_id = 2;
  string user_uuid = 3;
  string news_id = 4;
  string keyword = 5;
}

// ReserveAlertDeliveryResponse — результат резервирования.
message ReserveAlertDeliveryResponse {
  bool should_send = 1;
  string reason = 2; // duplicate, cooldown, ready
}

// FinalizeAlertDeliveryRequest — финализация доставки.
message FinalizeAlertDeliveryRequest {
  string event_id = 1;
  string status = 2; // sent, failed, dropped
  string error_message = 3;
  int64 sent_at_unix = 4; // unix seconds, only for sent
}

// FinalizeAlertDeliveryResponse — пустой ответ.
message FinalizeAlertDeliveryResponse {}
