name: Deploy Streamlit Client to Production (Manual)

on:
  # ВРЕМЕННО: запуск из ветки feat/AgregatorService без мержа в main
  # После мержа в main — удалить push триггер!
  push:
    branches:
      - feat/AgregatorService
    paths:
      - '.github/workflows/deploy-streamlit.yml'
      - 'client/**'
      - 'client.Dockerfile'
      - 'deploy/prod/docker-compose.streamlit.prod.yml'

  workflow_dispatch:
    inputs:
      action:
        description: 'Действие'
        required: true
        default: 'up'
        type: choice
        options:
          - up        # Пересобрать образ и запустить
          - down      # Остановить (без удаления данных)
          - restart   # Перезапустить контейнер
          - logs      # Показать последние 200 строк логов
          - recreate  # Пересоздать контейнер (образ уже в registry)
      rebuild:
        description: 'Пересобрать и запушить Docker-образ'
        required: true
        default: true
        type: boolean

env:
  REGISTRY: cr.selcloud.ru
  REGISTRY_PROJECT: otus-microservice-be
  IMAGE_NAME: streamlit-client
  IMAGE_TAG: latest

  VPS_PATH: /root/otus-microservice/prod/client
  COMPOSE_FILE: docker-compose.streamlit.prod.yml

jobs:
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    # При push — всегда собираем; при ручном запуске — только если rebuild=true
    if: github.event_name == 'push' || inputs.rebuild == true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Selectel Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.SELECTEL_REGISTRY_OTUS_USERNAME_PROD }}
          password: ${{ secrets.SELECTEL_REGISTRY_OTUS_TOKEN_PROD }}

      - name: Build and push Streamlit image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./client.Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.REGISTRY_PROJECT }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.REGISTRY_PROJECT }}/${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.REGISTRY_PROJECT }}/${{ env.IMAGE_NAME }}:buildcache,mode=max

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: [build-and-push]
    # Запускаем деплой всегда (даже если build-and-push был пропущен)
    if: always() && (needs.build-and-push.result == 'success' || needs.build-and-push.result == 'skipped')

    steps:
      - name: Resolve inputs (defaults for push trigger)
        id: ctx
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "action=up"      >> $GITHUB_OUTPUT
            echo "rebuild=true"   >> $GITHUB_OUTPUT
            echo "▶️  Push-триггер: action=up, rebuild=true"
          else
            echo "action=${{ inputs.action }}"   >> $GITHUB_OUTPUT
            echo "rebuild=${{ inputs.rebuild }}"  >> $GITHUB_OUTPUT
            echo "▶️  Manual-триггер: action=${{ inputs.action }}, rebuild=${{ inputs.rebuild }}"
          fi

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy docker-compose to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_OTUS_HOST }}
          username: ${{ secrets.VPS_OTUS_USER }}
          key: ${{ secrets.VPS_OTUS_SSH_KEY }}
          source: "deploy/prod/${{ env.COMPOSE_FILE }}"
          target: ${{ env.VPS_PATH }}
          strip_components: 2

      - name: Execute action on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_OTUS_HOST }}
          username: ${{ secrets.VPS_OTUS_USER }}
          key: ${{ secrets.VPS_OTUS_SSH_KEY }}
          script: |
            set -e
            mkdir -p ${{ env.VPS_PATH }}
            cd ${{ env.VPS_PATH }}

            if [ ! -f ${{ env.COMPOSE_FILE }} ]; then
              echo "❌ ${{ env.COMPOSE_FILE }} не найден!"
              exit 1
            fi

            echo "🔗 Проверка Docker-сети otus_network..."
            docker network inspect otus_network > /dev/null 2>&1 \
              || docker network create --driver bridge otus_network \
              && echo "✅ Сеть otus_network готова"

            echo "📦 Логин в Selectel Registry..."
            echo "${{ secrets.SELECTEL_REGISTRY_OTUS_TOKEN_PROD }}" | \
              docker login ${{ env.REGISTRY }} \
              -u "${{ secrets.SELECTEL_REGISTRY_OTUS_USERNAME_PROD }}" \
              --password-stdin

            case "${{ steps.ctx.outputs.action }}" in
              up)
                echo "🔄 Остановка старых контейнеров..."
                docker compose -f ${{ env.COMPOSE_FILE }} down || true

                echo "🗑️  Удаление старого образа..."
                docker image rm \
                  ${{ env.REGISTRY }}/${{ env.REGISTRY_PROJECT }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} \
                  || true

                echo "⬇️  Скачивание нового образа..."
                docker compose -f ${{ env.COMPOSE_FILE }} pull

                echo "🚀 Запуск контейнера Streamlit..."
                docker compose -f ${{ env.COMPOSE_FILE }} up -d

                echo "⏳ Ожидание готовности..."
                sleep 15

                docker compose -f ${{ env.COMPOSE_FILE }} ps
                echo "✅ Streamlit Client запущен!"
                echo "🌐 Доступен на порту 38085"
                ;;

              down)
                echo "⏸️  Остановка Streamlit (данные сохраняются)..."
                docker compose -f ${{ env.COMPOSE_FILE }} down
                echo "✅ Streamlit Client остановлен"
                ;;

              restart)
                echo "🔄 Перезапуск Streamlit..."
                docker compose -f ${{ env.COMPOSE_FILE }} restart
                sleep 10
                docker compose -f ${{ env.COMPOSE_FILE }} ps
                echo "✅ Streamlit Client перезапущен"
                ;;

              logs)
                echo "📋 Логи Streamlit Client (последние 200 строк):"
                docker compose -f ${{ env.COMPOSE_FILE }} logs --tail=200
                ;;

              recreate)
                echo "⬇️  Скачивание образа из registry..."
                docker compose -f ${{ env.COMPOSE_FILE }} pull

                echo "🔄 Пересоздание контейнера..."
                docker compose -f ${{ env.COMPOSE_FILE }} down
                docker compose -f ${{ env.COMPOSE_FILE }} up -d --force-recreate
                sleep 15
                docker compose -f ${{ env.COMPOSE_FILE }} ps
                echo "✅ Streamlit Client пересоздан"
                ;;
            esac

            echo ""
            echo "ℹ️  Статус контейнеров:"
            docker ps | grep streamlit || echo "Streamlit контейнер не запущен"

            echo ""
            echo "🧹 Очистка неиспользуемых образов..."
            docker image prune -f || true
