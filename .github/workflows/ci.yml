name: CI & Deploy to Production

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  GO_VERSION: 1.23.8
  GOLANGCI_LINT_VERSION: v2.1.6
  
  # Docker Registry
  REGISTRY: cr.selcloud.ru
  REGISTRY_PROJECT: otus-microservice-be
  IMAGE_TAG: latest

  # Main-service
  BE_IMAGE_NAME: backend
  VPS_PATH: /root/otus-microservice/prod/be
  APP_CONTAINER_NAME: otus-microservice-be-prod
  COMPOSE_FILE: docker-compose.be.prod.yml

  # Auth-Proxy
  AUTH_PROXY_IMAGE_NAME: auth-proxy
  AUTH_PROXY_VPS_PATH: /root/otus-microservice/prod/auth-proxy
  AUTH_PROXY_COMPOSE_FILE: docker-compose.auth-proxy.prod.yml

  # News-Collector
  NC_IMAGE_NAME: news-collector
  NC_VPS_PATH: /root/otus-microservice/prod/news-collector
  NC_COMPOSE_FILE: docker-compose.news-collector.prod.yml

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - uses: actions/checkout@v4
      - uses: golangci/golangci-lint-action@v6
        with:
          version: ${{ env.GOLANGCI_LINT_VERSION }}
          args: --timeout=5m

  test-unit:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - uses: actions/checkout@v4
      
      - name: Run unit tests
        run: |
          echo "🧪 Запуск unit тестов..."
          go test -race -count=1 -short -v ./...

  test-integration:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: otus_ms_test
          POSTGRES_USER: otus_ms_test
          POSTGRES_PASSWORD: otus_ms_test
        ports:
          - 38433:5432
        options: >-
          --health-cmd "pg_isready -U otus_ms_test -d otus_ms_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    
    steps:
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - uses: actions/checkout@v4
      
      - name: Install Task
        run: |
          sh -c "$(curl --location https://taskfile.dev/install.sh)" -- -d -b /usr/local/bin
      
      - name: Build applications
        run: |
          echo "🔨 Сборка приложений..."
          task build
          go build -o auth-proxy ./cmd/auth-proxy
      
      - name: Verify config file exists
        run: |
          echo "📋 Проверка наличия и содержимого конфигурационного файла..."
          if [ ! -f configs/config.ci.yaml ]; then
            echo "❌ Файл configs/config.ci.yaml не найден!"
            exit 1
          fi
          echo "✅ Файл configs/config.ci.yaml существует"
          echo "Содержимое секции JWT:"
          grep -A 3 "^jwt:" configs/config.ci.yaml || echo "JWT секция не найдена"
      
      - name: Start API server in background
        run: |
          echo "🚀 Запуск API сервера..."
          ./main-service -config configs/config.ci.yaml > api_server.log 2>&1 &
          echo $! > api_server.pid
          sleep 5
      
      - name: Wait for API server
        run: |
          echo "⏳ Ожидание готовности API сервера..."
          for i in {1..30}; do
            if curl -f http://localhost:8080/health > /dev/null 2>&1; then
              echo "✅ API сервер готов"
              exit 0
            fi
            echo "Попытка $i/30..."
            sleep 1
          done
          echo "❌ API сервер не запустился"
          exit 1
      
      - name: Test Keycloak client credentials
        run: |
          echo "🔐 Тестирование client credentials с Keycloak..."
          RESPONSE=$(curl -s -X POST https://fishouk-otus-ms.ru/auth/realms/otus-ms/protocol/openid-connect/token \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d "client_id=auth-proxy" \
            -d "client_secret=${KEYCLOAK_CLIENT_SECRET}" \
            -d "grant_type=client_credentials")
          
          if echo "$RESPONSE" | grep -q "access_token"; then
            echo "✅ Client credentials работают корректно"
          else
            echo "❌ Ошибка аутентификации клиента:"
            echo "$RESPONSE"
            echo ""
            echo "Возможные причины:"
            echo "1. KEYCLOAK_CLIENT_SECRET в GitHub Secrets неправильный"
            echo "2. У клиента auth-proxy в Keycloak не включен 'Service accounts roles'"
            echo "3. Секрет был изменен в Keycloak"
          fi
        env:
          KEYCLOAK_CLIENT_SECRET: ${{ secrets.KEYCLOAK_CLIENT_SECRET }}
      
      - name: Start Auth-Proxy in background
        run: |
          echo "🚀 Запуск Auth-Proxy..."
          ./auth-proxy -config configs/config.auth-proxy.ci.yaml > auth_proxy.log 2>&1 &
          echo $! > auth_proxy.pid
          sleep 3
        env:
          KEYCLOAK_CLIENT_SECRET: ${{ secrets.KEYCLOAK_CLIENT_SECRET }}
      
      - name: Wait for Auth-Proxy
        run: |
          echo "⏳ Ожидание готовности Auth-Proxy..."
          for i in {1..30}; do
            if curl -f http://localhost:38081/health > /dev/null 2>&1; then
              echo "✅ Auth-Proxy готов"
              exit 0
            fi
            echo "Попытка $i/30..."
            sleep 1
          done
          echo "⚠️  Auth-Proxy не запустился"
          echo "📋 Логи Auth-Proxy:"
          cat auth_proxy.log || echo "Логи недоступны"
          echo "📋 Статус процесса:"
          if [ -f auth_proxy.pid ]; then
            ps -p $(cat auth_proxy.pid) > /dev/null 2>&1 && echo "Процесс работает" || echo "Процесс завершен"
          fi
      
      - name: Run integration tests
        run: |
          echo "🧪 Запуск интеграционных тестов..."
          go test -race -count=1 -v -tags=integration ./tests/integration/...
        env:
          TEST_SERVER_URL: http://localhost:8080
          TEST_AUTH_PROXY_URL: http://localhost:38081
          TEST_KEYCLOAK_USERNAME: ${{ secrets.TEST_KEYCLOAK_USERNAME }}
          TEST_KEYCLOAK_PASSWORD: ${{ secrets.TEST_KEYCLOAK_PASSWORD }}
      
      - name: Show Auth-Proxy logs on failure
        if: failure()
        run: |
          echo "📋 Логи Auth-Proxy:"
          cat auth_proxy.log 2>/dev/null || echo "Логи Auth-Proxy недоступны"
          echo "📋 Логи Main Service:"
          cat api_server.log 2>/dev/null || echo "Логи Main Service недоступны"
      
      - name: Stop servers
        if: always()
        run: |
          if [ -f api_server.pid ]; then
            kill $(cat api_server.pid) || true
          fi
          if [ -f auth_proxy.pid ]; then
            kill $(cat auth_proxy.pid) || true
          fi

  build-and-deploy:
    runs-on: ubuntu-latest
    needs: [lint, test-unit, test-integration]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Selectel Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.SELECTEL_REGISTRY_OTUS_USERNAME_PROD }}
          password: ${{ secrets.SELECTEL_REGISTRY_OTUS_TOKEN_PROD }}

      - name: Build and push Backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./prod.Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.REGISTRY_PROJECT }}/${{ env.BE_IMAGE_NAME }}:${{ env.IMAGE_TAG }}

      - name: Copy docker-compose to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_OTUS_HOST }}
          username: ${{ secrets.VPS_OTUS_USER }}
          key: ${{ secrets.VPS_OTUS_SSH_KEY }}
          source: "deploy/prod/docker-compose.be.prod.yml"
          target: ${{ env.VPS_PATH }}
          strip_components: 2

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_OTUS_HOST }}
          username: ${{ secrets.VPS_OTUS_USER }}
          key: ${{ secrets.VPS_OTUS_SSH_KEY }}
          script: |
            # Создаем структуру директорий
            mkdir -p ${{ env.VPS_PATH }}/{configs,logs,data/files}
            
            # Переходим в рабочую директорию
            cd ${{ env.VPS_PATH }}
            
            # Проверяем что docker-compose файл скопирован
            if [ ! -f docker-compose.be.prod.yml ]; then
              echo "❌ docker-compose.be.prod.yml не найден!"
              exit 1
            fi
            
            # Проверяем наличие конфига
            if [ ! -f configs/config.prod.yaml ]; then
              echo "⚠️  configs/config.prod.yaml не найден!"
              echo "ℹ️  Создайте конфиг вручную в ${{ env.VPS_PATH }}/configs/"
              echo "ℹ️  Используйте configs/config.prod.example.yaml как шаблон"
              exit 1
            fi
            
            echo "📦 Логин в Selectel Registry..."
            echo "${{ secrets.SELECTEL_REGISTRY_OTUS_TOKEN_PROD }}" | docker login ${{ env.REGISTRY }} -u "${{ secrets.SELECTEL_REGISTRY_OTUS_USERNAME_PROD }}" --password-stdin
            
            echo "🔄 Остановка старых контейнеров..."
            docker compose -f ${{ env.COMPOSE_FILE }} down || true
            
            echo "🗑️  Удаление старых образов..."
            docker image rm ${{ env.REGISTRY }}/${{ env.REGISTRY_PROJECT }}/${{ env.BE_IMAGE_NAME }}:${{ env.IMAGE_TAG }} || true
            
            echo "⬇️  Скачивание нового образа..."
            docker compose -f ${{ env.COMPOSE_FILE }} pull
            
            echo "🚀 Запуск контейнеров..."
            docker compose -f ${{ env.COMPOSE_FILE }} up -d
            
            echo "✅ Production деплой завершен!"
            docker ps | grep otus-microservice
            
            echo "🧹 Очистка..."
            docker system prune -f || true

  build-and-deploy-auth-proxy:
    runs-on: ubuntu-latest
    needs: [lint, test-unit, test-integration]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Selectel Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.SELECTEL_REGISTRY_OTUS_USERNAME_PROD }}
          password: ${{ secrets.SELECTEL_REGISTRY_OTUS_TOKEN_PROD }}

      - name: Build and push Auth-Proxy
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./auth-proxy.Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.REGISTRY_PROJECT }}/${{ env.AUTH_PROXY_IMAGE_NAME }}:${{ env.IMAGE_TAG }}

      - name: Copy docker-compose to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_OTUS_HOST }}
          username: ${{ secrets.VPS_OTUS_USER }}
          key: ${{ secrets.VPS_OTUS_SSH_KEY }}
          source: "deploy/prod/${{ env.AUTH_PROXY_COMPOSE_FILE }}"
          target: ${{ env.AUTH_PROXY_VPS_PATH }}
          strip_components: 2

      - name: Deploy Auth-Proxy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_OTUS_HOST }}
          username: ${{ secrets.VPS_OTUS_USER }}
          key: ${{ secrets.VPS_OTUS_SSH_KEY }}
          script: |
            mkdir -p ${{ env.AUTH_PROXY_VPS_PATH }}/{configs,logs}
            cd ${{ env.AUTH_PROXY_VPS_PATH }}

            if [ ! -f ${{ env.AUTH_PROXY_COMPOSE_FILE }} ]; then
              echo "❌ ${{ env.AUTH_PROXY_COMPOSE_FILE }} не найден!"
              exit 1
            fi

            if [ ! -f configs/config.auth-proxy.prod.yaml ]; then
              echo "⚠️  configs/config.auth-proxy.prod.yaml не найден!"
              echo "ℹ️  Создайте конфиг вручную в ${{ env.AUTH_PROXY_VPS_PATH }}/configs/"
              exit 1
            fi

            echo "📦 Логин в Selectel Registry..."
            echo "${{ secrets.SELECTEL_REGISTRY_OTUS_TOKEN_PROD }}" | \
              docker login ${{ env.REGISTRY }} -u "${{ secrets.SELECTEL_REGISTRY_OTUS_USERNAME_PROD }}" --password-stdin

            echo "🔄 Остановка старых контейнеров..."
            docker compose -f ${{ env.AUTH_PROXY_COMPOSE_FILE }} down || true

            echo "🗑️  Удаление старого образа..."
            docker image rm ${{ env.REGISTRY }}/${{ env.REGISTRY_PROJECT }}/${{ env.AUTH_PROXY_IMAGE_NAME }}:${{ env.IMAGE_TAG }} || true

            echo "⬇️  Скачивание нового образа..."
            docker compose -f ${{ env.AUTH_PROXY_COMPOSE_FILE }} pull

            echo "🚀 Запуск Auth-Proxy..."
            docker compose -f ${{ env.AUTH_PROXY_COMPOSE_FILE }} up -d

            echo "✅ Auth-Proxy деплой завершен!"
            docker ps | grep auth-proxy

            echo "🧹 Очистка..."
            docker image prune -f || true

  build-and-deploy-news-collector:
    runs-on: ubuntu-latest
    # Запускаем строго после main-service: news-collector обращается к нему при старте
    needs: [lint, test-unit, test-integration, build-and-deploy]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Selectel Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.SELECTEL_REGISTRY_OTUS_USERNAME_PROD }}
          password: ${{ secrets.SELECTEL_REGISTRY_OTUS_TOKEN_PROD }}

      - name: Build and push News Collector
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./news-collector.Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.REGISTRY_PROJECT }}/${{ env.NC_IMAGE_NAME }}:${{ env.IMAGE_TAG }}

      - name: Copy docker-compose to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_OTUS_HOST }}
          username: ${{ secrets.VPS_OTUS_USER }}
          key: ${{ secrets.VPS_OTUS_SSH_KEY }}
          source: "deploy/prod/${{ env.NC_COMPOSE_FILE }}"
          target: ${{ env.NC_VPS_PATH }}
          strip_components: 2

      - name: Deploy News Collector to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_OTUS_HOST }}
          username: ${{ secrets.VPS_OTUS_USER }}
          key: ${{ secrets.VPS_OTUS_SSH_KEY }}
          script: |
            mkdir -p ${{ env.NC_VPS_PATH }}/{configs,logs}
            cd ${{ env.NC_VPS_PATH }}

            if [ ! -f ${{ env.NC_COMPOSE_FILE }} ]; then
              echo "❌ ${{ env.NC_COMPOSE_FILE }} не найден!"
              exit 1
            fi

            if [ ! -f configs/config.news-collector.prod.yaml ]; then
              echo "⚠️  configs/config.news-collector.prod.yaml не найден!"
              echo "ℹ️  Создайте конфиг вручную в ${{ env.NC_VPS_PATH }}/configs/"
              echo "ℹ️  Используйте configs/config.news-collector.prod.example.yaml как шаблон"
              exit 1
            fi

            echo "📦 Логин в Selectel Registry..."
            echo "${{ secrets.SELECTEL_REGISTRY_OTUS_TOKEN_PROD }}" | \
              docker login ${{ env.REGISTRY }} -u "${{ secrets.SELECTEL_REGISTRY_OTUS_USERNAME_PROD }}" --password-stdin

            echo "🔄 Остановка старых контейнеров..."
            docker compose -f ${{ env.NC_COMPOSE_FILE }} down || true

            echo "🗑️  Удаление старого образа..."
            docker image rm ${{ env.REGISTRY }}/${{ env.REGISTRY_PROJECT }}/${{ env.NC_IMAGE_NAME }}:${{ env.IMAGE_TAG }} || true

            echo "⬇️  Скачивание нового образа..."
            docker compose -f ${{ env.NC_COMPOSE_FILE }} pull

            echo "⏳ Ожидание готовности main-service (gRPC)..."
            for i in $(seq 1 12); do
              if curl -sf http://localhost:38080/health > /dev/null; then
                echo "✅ main-service доступен"
                break
              fi
              echo "  попытка $i/12, ждём 5 сек..."
              sleep 5
            done

            echo "🚀 Запуск News Collector..."
            docker compose -f ${{ env.NC_COMPOSE_FILE }} up -d

            echo "✅ News Collector деплой завершен!"
            docker ps | grep news-collector

            echo "🧹 Очистка..."
            docker image prune -f || true
