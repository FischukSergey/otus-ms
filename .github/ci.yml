name: CI & Deploy to Production

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  GO_VERSION: 1.23
  GOLANGCI_LINT_VERSION: v1.61.0
  
  # Docker Registry
  REGISTRY: cr.selcloud.ru
  BE_IMAGE_NAME: otus-microservice-be
  IMAGE_TAG: latest

  # VPS Configuration
  VPS_PATH: /root/otus-microservice/prod/be
  
  # Application Configuration
  APP_CONTAINER_NAME: otus-microservice-be-prod
  COMPOSE_FILE: docker-compose.be.prod.yml

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - uses: actions/checkout@v4
      - uses: golangci/golangci-lint-action@v4
        with:
          version: ${{ env.GOLANGCI_LINT_VERSION }}
          args: --timeout=5m

  test:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - uses: actions/checkout@v4
      
      - name: Run unit tests
        run: |
          echo "🧪 Запуск unit тестов..."
          go test -race -count=1 -v ./...

  build-and-deploy:
    runs-on: [self-hosted, production, backend]
    needs: [lint, test]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: 'main'

      - name: Log in to Selectel Registry
        env:
          SELECTEL_REGISTRY_TOKEN_PROD: ${{ secrets.SELECTEL_REGISTRY_TOKEN_PROD }}
          SELECTEL_REGISTRY_USERNAME_PROD: ${{ secrets.SELECTEL_REGISTRY_USERNAME_PROD }}
        run: |
          echo "$SELECTEL_REGISTRY_TOKEN_PROD" | docker login ${{ env.REGISTRY }} -u "$SELECTEL_REGISTRY_USERNAME_PROD" --password-stdin

      - name: Build and push Backend
        run: |
          docker build -t ${{ env.REGISTRY }}/${{ env.BE_IMAGE_NAME }}:${{ env.IMAGE_TAG }} -f ./prod.Dockerfile .
          docker push ${{ env.REGISTRY }}/${{ env.BE_IMAGE_NAME }}:${{ env.IMAGE_TAG }}

      - name: Copy docker-compose to VPS directory
        run: |
          # Создаем целевую директорию если не существует
          sudo mkdir -p ${{ env.VPS_PATH }}
          
          # Копируем только docker-compose файл
          sudo cp -f deploy/prod/docker-compose.be.prod.yml ${{ env.VPS_PATH }}/
          
          # Создаем необходимые директории для volumes
          sudo mkdir -p ${{ env.VPS_PATH }}/logs
          sudo mkdir -p ${{ env.VPS_PATH }}/data/files
          sudo chmod -R 755 ${{ env.VPS_PATH }}/logs
          sudo chmod -R 755 ${{ env.VPS_PATH }}/data/files
          
          echo "✅ docker-compose.be.prod.yml скопирован в ${{ env.VPS_PATH }}"

      - name: Deploy to Production
        env:
          BE_IMAGE: ${{ env.REGISTRY }}/${{ env.BE_IMAGE_NAME }}:${{ env.IMAGE_TAG }}
        run: |
          cd ${{ env.VPS_PATH }}
          
          # Проверяем что файлы на месте
          if [ ! -f docker-compose.be.prod.yml ]; then
            echo "❌ docker-compose.be.prod.yml не найден!"
            exit 1
          fi
          
          if [ ! -f configs/config.prod.yaml ]; then
            echo "❌ configs/config.prod.yaml не найден!"
            echo "ℹ️  Убедитесь что конфиг настроен вручную в ${{ env.VPS_PATH }}/configs/"
            exit 1
          fi
          
          echo "📦 Готово к деплою"

          # Graceful shutdown
          sudo docker compose -f ${{ env.COMPOSE_FILE }} down || true

          # Удаляем старые образы для освобождения места
          sudo docker image rm $BE_IMAGE || true

          # Обновляем образы
          sudo docker compose -f ${{ env.COMPOSE_FILE }} pull

          # Запуск контейнеров
          sudo docker compose -f ${{ env.COMPOSE_FILE }} up -d
          
          echo "🎉 Production деплой завершен!"
          sudo docker ps | grep otus-microservice

      - name: Cleanup Docker
        if: always()
        run: |
          sudo docker system prune -f --volumes || true
          sudo docker ps | grep otus-microservice
