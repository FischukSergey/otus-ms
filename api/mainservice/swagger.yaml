host: fishouk-otus-ms.ru
info:
  contact:
    name: OtusMS Support
    url: https://github.com/FischukSergey/otus-ms
  description: |-
    Введите: Bearer {токен} — с префиксом и пробелом.
    Токен: POST /api/v1/auth/login. Роли в claim realm_access.roles
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  termsOfService: http://swagger.io/terms/
  title: OtusMS Main Service API
  version: 1.0.0
paths:
  /api/v1/news:
    get:
      description: Возвращает последние новости с полями topic, source и url. Требуется
        роль admin.
      parameters:
      - description: Лимит записей (1..500), по умолчанию 50
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Список новостей
          schema:
            items:
              $ref: '#/definitions/internal_handlers_newshttp.NewsResponse'
            type: array
        "400":
          description: Некорректный query-параметр limit
          schema:
            $ref: '#/definitions/internal_handlers_newshttp.ErrorResponse'
        "401":
          description: Не авторизован - отсутствует или невалидный JWT токен
          schema:
            $ref: '#/definitions/internal_handlers_newshttp.ErrorResponse'
        "403":
          description: Доступ запрещён - требуется роль admin
          schema:
            $ref: '#/definitions/internal_handlers_newshttp.ErrorResponse'
        "500":
          description: Внутренняя ошибка сервера
          schema:
            $ref: '#/definitions/internal_handlers_newshttp.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Получить список новостей (только admin)
      tags:
      - news
  /api/v1/news/events:
    post:
      consumes:
      - application/json
      description: Принимает события view/click/like/dislike/hide для текущего пользователя
        (роль user/admin).
      parameters:
      - description: Событие пользователя
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/github.com_FischukSergey_otus-ms_internal_handlers_personalization.CreateEventRequestSchema'
      produces:
      - application/json
      responses:
        "202":
          description: ""
        "400":
          description: Невалидный payload
          schema:
            $ref: '#/definitions/github.com_FischukSergey_otus-ms_internal_handlers_personalization.ErrorResponse'
        "401":
          description: Не авторизован
          schema:
            $ref: '#/definitions/github.com_FischukSergey_otus-ms_internal_handlers_personalization.ErrorResponse'
        "403":
          description: Недостаточно прав
          schema:
            $ref: '#/definitions/github.com_FischukSergey_otus-ms_internal_handlers_personalization.ErrorResponse'
        "500":
          description: Внутренняя ошибка сервера
          schema:
            $ref: '#/definitions/github.com_FischukSergey_otus-ms_internal_handlers_personalization.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Отправить пользовательское событие
      tags:
      - personalization
  /api/v1/news/feed:
    get:
      description: Возвращает новости с фильтрацией и ранжированием score для текущего
        пользователя (роль user/admin).
      parameters:
      - description: Лимит (1..100), по умолчанию 50
        in: query
        name: limit
        type: integer
      - description: Смещение, по умолчанию 0
        in: query
        name: offset
        type: integer
      - description: Окно выдачи в часах
        in: query
        name: fromHours
        type: integer
      - description: FTS запрос (websearch syntax)
        in: query
        name: q
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Персонализированная лента
          schema:
            items:
              $ref: '#/definitions/github.com_FischukSergey_otus-ms_internal_handlers_personalization.FeedItemResponseSchema'
            type: array
        "400":
          description: Невалидные query-параметры
          schema:
            $ref: '#/definitions/github.com_FischukSergey_otus-ms_internal_handlers_personalization.ErrorResponse'
        "401":
          description: Не авторизован
          schema:
            $ref: '#/definitions/github.com_FischukSergey_otus-ms_internal_handlers_personalization.ErrorResponse'
        "403":
          description: Недостаточно прав
          schema:
            $ref: '#/definitions/github.com_FischukSergey_otus-ms_internal_handlers_personalization.ErrorResponse'
        "500":
          description: Внутренняя ошибка сервера
          schema:
            $ref: '#/definitions/github.com_FischukSergey_otus-ms_internal_handlers_personalization.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Получить персонализированную ленту
      tags:
      - personalization
  /api/v1/users:
    get:
      description: Возвращает всех пользователей из таблицы users, включая мягко удалённых.
        Требуется роль admin.
      produces:
      - application/json
      responses:
        "200":
          description: Список пользователей
          schema:
            items:
              $ref: '#/definitions/user.Response'
            type: array
        "401":
          description: Не авторизован - отсутствует или невалидный JWT токен
          schema:
            $ref: '#/definitions/internal_handlers_user.ErrorResponse'
        "403":
          description: Доступ запрещён - требуется роль admin
          schema:
            $ref: '#/definitions/internal_handlers_user.ErrorResponse'
        "500":
          description: Внутренняя ошибка сервера
          schema:
            $ref: '#/definitions/internal_handlers_user.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Получить список всех пользователей (только admin)
      tags:
      - users
    post:
      consumes:
      - application/json
      description: |-
        Создаёт нового пользователя. UUID и email должны быть уникальными.
        Доступно для роли admin или service-account (для service-to-service
        коммуникации между Auth-Proxy и Main Service).
      parameters:
      - description: Данные нового пользователя
        in: body
        name: user
        required: true
        schema:
          $ref: '#/definitions/user.CreateRequest'
      produces:
      - application/json
      responses:
        "201":
          description: ""
        "400":
          description: Невалидный запрос или ошибка валидации
          schema:
            $ref: '#/definitions/internal_handlers_user.ErrorResponse'
        "401":
          description: Не авторизован - отсутствует или невалидный JWT токен
          schema:
            $ref: '#/definitions/internal_handlers_user.ErrorResponse'
        "403":
          description: Доступ запрещён - требуется роль admin или service-account
          schema:
            $ref: '#/definitions/internal_handlers_user.ErrorResponse'
        "500":
          description: Внутренняя ошибка сервера
          schema:
            $ref: '#/definitions/internal_handlers_user.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Создать пользователя (admin или service account)
      tags:
      - users
  /api/v1/users/{uuid}:
    delete:
      description: Мягкое удаление (soft delete). Запись остаётся в БД с флагом deleted=true.
        Требуется роль admin.
      parameters:
      - description: 'UUID пользователя (формат: uuid4)'
        in: path
        name: uuid
        required: true
        type: string
      produces:
      - application/json
      responses:
        "204":
          description: Пользователь успешно удалён
        "400":
          description: Невалидный UUID
          schema:
            $ref: '#/definitions/internal_handlers_user.ErrorResponse'
        "401":
          description: Не авторизован - отсутствует или невалидный JWT токен
          schema:
            $ref: '#/definitions/internal_handlers_user.ErrorResponse'
        "403":
          description: Доступ запрещён - недостаточно прав (требуется роль admin)
          schema:
            $ref: '#/definitions/internal_handlers_user.ErrorResponse'
        "404":
          description: Пользователь не найден
          schema:
            $ref: '#/definitions/internal_handlers_user.ErrorResponse'
        "500":
          description: Внутренняя ошибка сервера
          schema:
            $ref: '#/definitions/internal_handlers_user.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Удалить пользователя (только admin)
      tags:
      - users
    get:
      description: Возвращает данные пользователя по UUID. Мягко удалённый вернётся
        с deleted=true. Требуется роль admin.
      parameters:
      - description: 'UUID пользователя (формат: uuid4)'
        in: path
        name: uuid
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Данные пользователя
          schema:
            $ref: '#/definitions/user.Response'
        "400":
          description: Невалидный UUID
          schema:
            $ref: '#/definitions/internal_handlers_user.ErrorResponse'
        "401":
          description: Не авторизован - отсутствует или невалидный JWT токен
          schema:
            $ref: '#/definitions/internal_handlers_user.ErrorResponse'
        "403":
          description: Доступ запрещён - недостаточно прав (требуется роль admin)
          schema:
            $ref: '#/definitions/internal_handlers_user.ErrorResponse'
        "404":
          description: Пользователь не найден
          schema:
            $ref: '#/definitions/internal_handlers_user.ErrorResponse'
        "500":
          description: Внутренняя ошибка сервера
          schema:
            $ref: '#/definitions/internal_handlers_user.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Получить пользователя (только admin)
      tags:
      - users
  /api/v1/users/me/preferences:
    get:
      description: Возвращает настройки personalization для текущего пользователя
        (роль user/admin).
      produces:
      - application/json
      responses:
        "200":
          description: Предпочтения пользователя
          schema:
            $ref: '#/definitions/github.com_FischukSergey_otus-ms_internal_handlers_personalization.PreferencesResponseSchema'
        "401":
          description: Не авторизован
          schema:
            $ref: '#/definitions/github.com_FischukSergey_otus-ms_internal_handlers_personalization.ErrorResponse'
        "403":
          description: Недостаточно прав
          schema:
            $ref: '#/definitions/github.com_FischukSergey_otus-ms_internal_handlers_personalization.ErrorResponse'
        "500":
          description: Внутренняя ошибка сервера
          schema:
            $ref: '#/definitions/github.com_FischukSergey_otus-ms_internal_handlers_personalization.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Получить предпочтения пользователя
      tags:
      - personalization
    put:
      consumes:
      - application/json
      description: Создает или обновляет настройки personalization текущего пользователя
        (роль user/admin).
      parameters:
      - description: Настройки personalization
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/github.com_FischukSergey_otus-ms_internal_handlers_personalization.UpdatePreferencesRequestSchema'
      produces:
      - application/json
      responses:
        "204":
          description: ""
        "400":
          description: Невалидный payload
          schema:
            $ref: '#/definitions/github.com_FischukSergey_otus-ms_internal_handlers_personalization.ErrorResponse'
        "401":
          description: Не авторизован
          schema:
            $ref: '#/definitions/github.com_FischukSergey_otus-ms_internal_handlers_personalization.ErrorResponse'
        "403":
          description: Недостаточно прав
          schema:
            $ref: '#/definitions/github.com_FischukSergey_otus-ms_internal_handlers_personalization.ErrorResponse'
        "500":
          description: Внутренняя ошибка сервера
          schema:
            $ref: '#/definitions/github.com_FischukSergey_otus-ms_internal_handlers_personalization.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Обновить предпочтения пользователя
      tags:
      - personalization
  /news.v1.NewsService/SaveProcessedNews:
    post:
      responses: {}
  /news_sources.v1.NewsSourcesService/GetNewsSources:
    post:
      responses: {}
securityDefinitions:
  BearerAuth:
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
