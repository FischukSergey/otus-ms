# https://taskfile.dev
version: '3'

silent: true

vars:
  GO_MODULE: github.com/FischukSergey/otus-ms # Исправлено имя модуля
  GO_FILES:
    sh: find . -type f -name '*.go' -not -path "./vendor/*" -not -path "./internal/store/*" -not -path "*.gen.go" | tr "\n" " "

  GOLANGCI_LINT_VERSION: v1.63.4
  GOLANGCI_LINT_CACHE:
    sh: echo "$HOME/Library/Caches/golangci-lint" # сделал отдельную директорию для кэша

  DEV_TOOLS: >-
    github.com/daixiang0/gci@v0.10.1
    mvdan.cc/gofumpt@v0.4.0
    github.com/kazhuravlev/options-gen/cmd/options-gen@v0.33.2
  
  DOCKER_COMPOSE_PATHS: >- #задел на будущее
    -f ./deploy/local/docker-compose.local.yml

  DOCKER_COMPOSE_CMD: "docker compose"
  PROJECT_NAME: "otus"

tasks:
  default:
    cmds:
      # Последовательно выполняем таски tidy, fmt, lint, tests и build
      - task: tidy
      - task: fmt
      - task: lint
      - task: tests
      - task: build

  tidy:
    - echo "- Tidy"
    - go mod tidy
    - task: vendor

  vendor:
    - echo "- Vendor"
    - go mod vendor || true
    - mkdir -p vendor
    - touch vendor/.gitkeep

  fmt:
    - echo "- Format"
    - gofumpt -w {{.GO_FILES}}
    #- gci write --section Standard --section Default --section "Prefix({{.GO_MODULE}})" {{.GO_FILES}}

  lint:
    cmds:
      - echo "- Lint"
      - mkdir -p {{.GOLANGCI_LINT_CACHE}}
      - task: lint:cmd
        vars: {CLI_ARGS: "run -v --fix --timeout=5m ./..."}

  lint:cmd: # запуск линтера в контейнере
    cmds:
      - |
        docker run --rm \
          -v "$(pwd):/app" -w /app \
          -v "{{.GOLANGCI_LINT_CACHE}}:/root/.cache" \
          -e GOEXPERIMENT=rangefunc \
          golangci/golangci-lint:{{.GOLANGCI_LINT_VERSION}} \
          golangci-lint {{.CLI_ARGS}}

  test:unit:
    desc: "Запустить только unit тесты"
    cmds:
      - echo "- Unit Tests"
      - go test -race -count=1 -short ./...

  test:env:up:
    desc: "Поднять тестовое окружение (БД + API сервер)"
    cmds:
      - echo "- Starting test environment..."
      - "{{.DOCKER_COMPOSE_CMD}} -f ./deploy/test/docker-compose.test.yml up -d --build"
      - echo "- Waiting for services to be ready..."
      - sleep 10

  test:env:down:
    desc: "Остановить и удалить тестовое окружение"
    cmds:
      - echo "- Stopping test environment..."
      - "{{.DOCKER_COMPOSE_CMD}} -f ./deploy/test/docker-compose.test.yml down -v"

  test:env:logs:
    desc: "Показать логи тестового окружения"
    cmds:
      - "{{.DOCKER_COMPOSE_CMD}} -f ./deploy/test/docker-compose.test.yml logs -f"

  test:integration:
    desc: "Запустить интеграционные тесты (с поднятием окружения)"
    cmds:
      - task: test:env:down
      - task: test:env:up
      - echo "- Integration Tests"
      - go test -race -count=1 -v -tags=integration ./tests/integration/...
      - task: test:env:down

  tests:
    desc: "Запустить ВСЕ тесты (unit + integration)"
    cmds:
      - echo "- Running all tests"
      - task: test:unit
      - task: test:integration

  build:
    cmds:
      - echo "- Build"
      - go build ./cmd/main-service
